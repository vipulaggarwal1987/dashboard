<title>Vipul UK Brand Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1B2A4A 0%, #2d4a7a 50%, #1B2A4A 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .login-card { background: white; border-radius: 20px; padding: 48px 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); max-width: 420px; width: 90%; text-align: center; }
  .lock-icon { font-size: 48px; margin-bottom: 16px; }
  .login-card h1 { font-size: 22px; color: #1B2A4A; margin-bottom: 8px; }
  .login-card p { color: #667085; font-size: 14px; margin-bottom: 28px; }
  .login-card input[type="password"] { width: 100%; padding: 14px 18px; border: 2px solid #d0d5dd; border-radius: 10px; font-size: 15px; outline: none; transition: border-color 0.2s; margin-bottom: 16px; }
  .login-card input[type="password"]:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.15); }
  .login-card button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #1B2A4A 0%, #2d4a7a 100%); color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .login-card button:hover { opacity: 0.9; }
  .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { color: #dc2626; font-size: 13px; margin-top: 12px; display: none; }
  .loading-msg { color: #667085; font-size: 13px; margin-top: 12px; display: none; }
</style>

document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();
  var pw = document.getElementById("pwd").value;
  if (!pw) return;

  document.getElementById("err").style.display = "none";
  document.getElementById("load").style.display = "block";
  document.getElementById("btn").disabled = true;

  setTimeout(function() {
    try {
      var decrypted = CryptoJS.AES.decrypt(ED, pw);
      var text = decrypted.toString(CryptoJS.enc.Utf8);

      if (!text || text.length < 100) {
        throw new Error("bad");
      }

      document.open();
      document.write(text);
      document.close();
    } catch(ex) {
      document.getElementById("err").style.display = "block";
      document.getElementById("load").style.display = "none";
      document.getElementById("btn").disabled = false;
      document.getElementById("pwd").value = "";
      document.getElementById("pwd").focus();
    }
  }, 150);
});
</script>
